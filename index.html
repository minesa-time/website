<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>minesa hub</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" async></script>
    </head>

    <body>
        <header>
            <!-- Logo -->
            <img
                class="springish"
                src="./assets/vectors/minesa-logo.svg"
                alt="Minesa's Logo"
            />
            <!-- Dynamic Notification -->
            <div tabindex="-1" class="dynamic-header springish">
                <img
                    width="25px"
                    height="25px"
                    src="../../assets/images/teams/neo/Game.jpg"
                    alt=""
                />
                <div class="content">
                    <h4
                        class="now-playing"
                        style="color: var(--secondary-color)"
                    >
                        New song is out!
                    </h4>
                    <h5 class="album-name">Heroes of Realm</h5>
                </div>
                <div
                    class="circle"
                    style="border-color: var(--secondary-color)"
                ></div>
            </div>
            <!-- Mail Icon -->
            <img class="springish" src="./assets/vectors/contact.svg" alt="" />
        </header>

        <main>
            <section>
                <div class="hero-title-section">
                    <p>Interact to us.</p>
                    <h1><span>We're here.</span> Just here and there.</h1>

                    <a
                        href="./pages/team/mica.html"
                        class="image-circle circle1"
                    >
                        <img src="./assets/images/mica_face.jpeg" alt="Mica" />
                    </a>

                    <a
                        href="./pages/team/neo.html"
                        class="image-circle circle2"
                    >
                        <img src="./assets/images/neo_face.jpeg" alt="Neo" />
                    </a>

                    <a
                        href="./pages/team/saku.html"
                        class="image-circle circle3"
                    >
                        <img src="./assets/images/saku_face.jpeg" alt="Saku" />
                    </a>
                </div>
            </section>
        </main>
    </body>
</html>
