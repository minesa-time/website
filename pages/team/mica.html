<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mica - Your Work Partner</title>
        <link rel="stylesheet" href="../../style.css" />
    </head>
    <body>
        <header>
            <!-- Logo -->
            <a href="../../index.html"
                ><img
                    class="springish"
                    src="../../assets/vectors/team/mica_logo.svg"
                    alt="Mica's Logo"
            /></a>
            <!-- Dynamic Notification -->
            <div tabindex="-1" class="dynamic-header springish">
                <img
                    width="25px"
                    height="25px"
                    src="../../assets/images/teams/neo/Game.jpg"
                    alt=""
                />
                <div class="content">
                    <h4 class="now-playing" style="color: var(--blue-color)">
                        New song is out!
                    </h4>
                    <h5 class="album-name">Heroes of Realm</h5>
                </div>
                <div
                    class="circle"
                    style="border-color: var(--blue-color)"
                ></div>
            </div>
            <!-- Mail Icon -->
            <img
                class="springish"
                src="../../assets/vectors/contact.svg"
                alt=""
            />
        </header>

        <main>
            <section class="hero">
                <div class="info">
                    <img
                        class="team-icon springish"
                        src="../../assets/images/teams/minesa_mica.png"
                        width="131px"
                        height="auto"
                        alt="Mica, under Minesa logo"
                    />

                    <div class="ach-2">
                        <strong class="primary-text springish"
                            ><sup>+</sup>40</strong
                        >
                        <span class="secondary-text springish">Arts Drew</span>
                    </div>
                </div>

                <div class="titles">
                    <h1 class="primary-text">Hello</h1>
                    <p class="secondary-text">
                        － It’s <strong class="primary-text">Mica</strong>, your
                        work partner.
                    </p>
                </div>
                <img
                    class="hero-image fade-in"
                    loading="lazy"
                    src="../../assets/images/teams/mica/Mica.webp"
                    alt=""
                />
            </section>
            <section class="about-me">
                <div class="content">
                    <h2>Who is she?</h2>
                    <p>
                        Welcome. Mica known as
                        <span style="color: var(--blue-color)">Micadevil</span>
                        is 18 years old woman; studying University now.
                    </p>
                    <p>
                        She has done a lot of art drawings back then. She is
                        studying to become a teacher.
                    </p>
                </div>
                <img
                    src="../../assets/images/teams/mica/mica-aboutme.png"
                    alt="Mica"
                />
            </section>
        </main>
    </body>
</html>
